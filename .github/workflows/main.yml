# ==========================================================================
# Metrics - Profile README widgets
# Generates only the SVGs actually used in README.md
# Secret used: GHKEY (GitHub PAT)
# ==========================================================================

name: Metrics
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: "🈷️ Languages - Most used"
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.languages.svg
          token: ${{ secrets.GHKEY }}
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake,
            lex, cmake, shell, gnuplot
          plugin_languages_limit: 4
          user: ${{ github.repository_owner }}


      - name: "📆 Commit calendar - Current year"
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.calendar.svg
          token: ${{ secrets.GHKEY }}
          base: ""
          plugin_calendar: yes
          user: ${{ github.repository_owner }}

      - name: "✨ Stargazers - Classic charts"
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.stargazers.svg
          token: ${{ secrets.GHKEY }}
          base: ""
          plugin_stargazers: yes
          user: ${{ github.repository_owner }}

      - name: "🌟 Recently starred repositories"
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.stars.svg
          token: ${{ secrets.GHKEY }}
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 3
          user: ${{ github.repository_owner }}

      - name: "🕹️ Steam - Recently played games"
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.steam.svg
          token: ${{ secrets.GHKEY }}
          base: ""
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_API_KEY }}
          plugin_steam_user: "76561197997208342"
          plugin_steam_sections: recently-played
          user: ${{ github.repository_owner }}

